<div class="min-h-[80vh] flex items-center justify-center p-6 animate-[fadeIn_0.5s_ease-out]">
  <app-card class="w-full max-w-md relative z-10 shadow-2xl border-white/10" padding="large">
    <div class="flex items-center gap-3 mb-8 justify-center">
      <span class="text-3xl">✨</span>
      <h1 class="text-3xl font-bold font-heading text-slate-50 tracking-tight">LifeOS</h1>
    </div>

    <h2 class="text-xl font-medium text-slate-300 mb-6 text-center">
      {{ isLogin ? 'Welcome back' : 'Create your account' }}
    </h2>

    <div *ngIf="error" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Email Address</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required
               class="bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-slate-50 text-sm focus:outline-none focus:border-primary transition-all"
               placeholder="name@example.com">
      </div>
      
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required
               class="bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-slate-50 text-sm focus:outline-none focus:border-primary transition-all"
               placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="!credentials.email || !credentials.password || isLoading"
              class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-xl transition-all shadow-[0_4px_14px_rgba(99,102,241,0.39)] disabled:opacity-50 mt-6">
        {{ isLoading ? 'Processing...' : (isLogin ? 'Sign In' : 'Get Started') }}
      </button>

      <div class="text-center mt-6">
        <button type="button" (click)="toggleMode()" class="text-sm text-slate-500 hover:text-primary transition-colors">
          {{ isLogin ? "Don't have an account? Sign up" : 'Already have an account? Log in' }}
        </button>
      </div>
    </form>
  </app-card>
</div>
