server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/lifeos}
    username: ${DATABASE_USERNAME:lifeos_user}
    password: ${DATABASE_PASSWORD:lifeos_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

# AI Configuration
openai:
  api:
    key: ${OPENAI_API_KEY:mock-key}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:mE9OYlJmVWpYbjJyNXV4eC9BQDQoRythS2JQMGRTZzZLa1lw}
      expiration: ${JWT_EXPIRATION:86400000}

# CORS - allow frontend origin
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
